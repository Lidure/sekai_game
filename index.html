<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sekai Game — 25-ji Metroidvania</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: grid;
            place-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            border: 0;
            border-radius: 8px;
            box-shadow: none;
            overflow: hidden;
        }
        #game-container canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>

    <script src="src/SceneManager.js"></script>
    <script src="src/i18n.js"></script>
    <script src="src/audio-settings.js"></script>
    <script src="src/scenes/HUDScene.js"></script>
    <script src="src/ui/PauseMenu.js"></script>
    <script src="src/ui/SaveSlotPicker.js"></script>
    <script src="src/ui/MapView.js"></script>
    <script src="src/ui/CharacterPanel.js"></script>
    
    <script src="src/entities/Player.js"></script>
    <script src="src/entities/BossMafuyu.js"></script>
    <script src="src/enemies/Enemy.js"></script>
    <script src="src/enemies/ShadowFragment.js"></script>
    <script src="src/enemies/FloatingShard.js"></script>
    <script src="src/enemies/Skeleton.js"></script>
    <script src="src/enemies/Bat.js"></script>
    <script src="src/enemies/BloatedShadow.js"></script>
    <script src="src/enemies/WandererCrystal.js"></script>
    <script src="src/systems/Bench.js"></script>
    <script src="src/systems/AbilityItem.js"></script>
    <script src="src/systems/AbilityGate.js"></script>
    <script src="src/systems/DestructibleWall.js"></script>
    <script src="src/systems/MovingPlatform.js"></script>
    <script src="src/systems/Collectible.js"></script>
    <script src="src/systems/NPC.js"></script>
    <script src="src/systems/RoomDef.js"></script>
    <script src="src/audio-manifest.js"></script>
    <script src="src/scenes/BootScene.js"></script>
    <script src="src/scenes/MenuScene.js"></script>
    <script src="src/scenes/GameScene.js"></script>
    <script src="src/scenes/BossScene.js"></script>
    <script src="src/scenes/CreditsScene.js"></script>
    <script src="game.js"></script>
</body>
</html>
